name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install scikit-learn pandas numpy pyyaml nltk flask pytest

    - name: Download NLTK data
      run: |
        python -c "import nltk; nltk.download('stopwords'); nltk.download('wordnet'); nltk.download('punkt'); nltk.download('punkt_tab')"

    - name: Test data preprocessing module
      run: |
        python -c "from src.data_preprocessing import text_preprocess; print(text_preprocess('This movie was great!')); print('Preprocessing module OK')"

    - name: Test Flask app import
      run: |
        python -c "import flask; print('Flask OK')"

    - name: Check project structure
      run: |
        python -c "
        import os
        required = ['src/data_preprocessing.py', 'src/train_traditional.py', 'src/train_transformer.py', 'src/evaluate.py', 'app.py', 'Dockerfile', 'params.yaml', 'requirements.txt']
        for f in required:
            assert os.path.exists(f), f'Missing: {f}'
            print(f'Found: {f}')
        print('All files present!')
        "