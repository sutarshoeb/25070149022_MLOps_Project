stages:
  preprocess:
    cmd: python3 src/data_preprocessing.py
    deps:
      - src/data_preprocessing.py
      - data/raw/IMDB Dataset.csv
      - params.yaml
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  train_traditional:
    cmd: python3 src/train_traditional.py
    deps:
      - src/train_traditional.py
      - data/processed/train.csv
      - data/processed/test.csv
      - params.yaml
    outs:
      - models/

  evaluate:
    cmd: python3 src/evaluate.py
    deps:
      - src/evaluate.py
      - data/processed/test.csv
      - models/