data:
  raw_path: "data/raw/IMDB Dataset.csv"
  processed_path: "data/processed/"
  test_size: 0.2
  random_state: 42
  max_features: 5000

traditional:
  max_iter: 5000

transformer:
  hidden_size: 256
  num_attention_heads: 8
  num_hidden_layers: 4
  intermediate_size: 1024
  hidden_dropout_prob: 0.1
  num_labels: 2
  max_length: 256
  batch_size: 32
  epochs: 10
  learning_rate: 0.0001

mlflow:
  experiment_name: "IMDB_Sentiment_Analysis"